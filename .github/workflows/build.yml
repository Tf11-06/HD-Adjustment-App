name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── macOS Intel DMG ────────────────────────────────────────────────────────
  build-mac-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install DMG builder
        run: pip install dmgbuild

      - name: Run tests
        run: python3 -m pytest -q

      - name: Build app bundle
        run: pyinstaller build_mac.spec --noconfirm

      - name: Verify Intel macOS build
        run: |
          file dist/HDProcessor.app/Contents/MacOS/HDProcessor
          lipo -archs dist/HDProcessor.app/Contents/MacOS/HDProcessor | grep -q x86_64

      - name: Sign app bundle
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash installer/macos_signing.sh sign-app

      - name: Package DMG
        env:
          DMG_PATH: dist/HDProcessor-Intel.dmg
        run: bash installer/mac_dmg.sh

      - name: Notarize DMG
        env:
          DMG_PATH: dist/HDProcessor-Intel.dmg
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash installer/macos_signing.sh notarize-dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: HDProcessor-mac-intel
          path: dist/HDProcessor-Intel.dmg

  # ── macOS Apple Silicon DMG ────────────────────────────────────────────────
  build-mac-apple-silicon:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install DMG builder
        run: pip install dmgbuild

      - name: Run tests
        run: python3 -m pytest -q

      - name: Build app bundle
        run: pyinstaller build_mac.spec --noconfirm

      - name: Verify Apple Silicon macOS build
        run: |
          file dist/HDProcessor.app/Contents/MacOS/HDProcessor
          lipo -archs dist/HDProcessor.app/Contents/MacOS/HDProcessor | grep -q arm64

      - name: Sign app bundle
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash installer/macos_signing.sh sign-app

      - name: Package DMG
        env:
          DMG_PATH: dist/HDProcessor-AppleSilicon.dmg
        run: bash installer/mac_dmg.sh

      - name: Notarize DMG
        env:
          DMG_PATH: dist/HDProcessor-AppleSilicon.dmg
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash installer/macos_signing.sh notarize-dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: HDProcessor-mac-apple-silicon
          path: dist/HDProcessor-AppleSilicon.dmg

  # ── Windows EXE installer ──────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build exe
        run: pyinstaller build.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer\windows.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: HDProcessor-windows
          path: installer\Output\HDProcessor-Setup.exe

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    needs: [build-mac-intel, build-mac-apple-silicon, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Mac Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: HDProcessor-mac-intel
          path: artifacts/

      - name: Download Mac Apple Silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: HDProcessor-mac-apple-silicon
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: HDProcessor-windows
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/HDProcessor-Intel.dmg
            artifacts/HDProcessor-AppleSilicon.dmg
            artifacts/HDProcessor-Setup.exe
          body: |
            ## HD Adjustment Processor ${{ github.ref_name }}

            ### Installation

            **Mac Intel:** Download `HDProcessor-Intel.dmg`, open it, drag `HDProcessor.app` to Applications.
            **Mac Apple Silicon:** Download `HDProcessor-AppleSilicon.dmg`, open it, drag `HDProcessor.app` to Applications.
            If this release was built with Apple Developer signing credentials, macOS
            should open it normally. If macOS says Apple cannot verify the app, use a
            notarized release build.

            **Windows:** Download `HDProcessor-Setup.exe`, double-click, follow the installer.
            If Windows SmartScreen shows a warning: click "More info" → "Run anyway".

            **Google Sheets:** Klear Concepts owns the Google Cloud project, Sheets API,
            and service account. In Settings, paste the Sheet ID and browse to the
            `service_account.json` file for the Klear Concepts Google Sheets setup.

            ### What's included
            - Drag & drop up to 20 HD 812 adjustment PDFs
            - Output to Google Sheets or Excel (.xlsx)
            - Standard 812 and RM returned-goods invoice support
            - Duplicate invoice detection with batch skip/add options
